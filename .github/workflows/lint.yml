name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configs:
    uses: LouisBrunner/.github/.github/workflows/lint-configs.yml@main

  vet:
    uses: LouisBrunner/.github/.github/workflows/lint-go.yml@main

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Test
        run: |
          make test-ci
          make coverage-ci

      - name: Publish results
        if: always()
        uses: LouisBrunner/.github/.github/actions/junit-cobertura@main
        with:
          junit-file: report.xml
          cobertura-file: cobertura.xml
